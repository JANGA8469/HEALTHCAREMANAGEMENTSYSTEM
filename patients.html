<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background:#f5f7fb;
    font-family:Arial, sans-serif;
    padding:30px;
}

.page-title{
    font-weight:700;
    margin-bottom:20px;
}

.patient-card{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.search-box{
    border-radius:10px;
}

.table{
    margin-top:20px;
}

.btn-primary{
    border-radius:10px;
}

</style>

</head>

<body>

<h2 class="page-title">
    <i class="fa-solid fa-users"></i>
    Patient Management
</h2>

<div class="patient-card">

<!-- ADD PATIENT FORM -->
<form method="POST">

<div class="row mb-3">

<div class="col">
<input name="name" class="form-control" placeholder="Patient Name" required>
</div>

<div class="col">
<input name="age" class="form-control" placeholder="Age" required>
</div>

<div class="col">
<select name="gender" class="form-control">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="col">
<input name="phone" class="form-control" placeholder="Phone" required>
</div>

</div>

<button class="btn btn-primary">
    <i class="fa-solid fa-plus"></i>
    Add Patient
</button>

</form>

<!-- TABLE -->
<table class="table table-hover align-middle">

<thead class="table-light">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Phone</th>
</tr>

</thead>

<tbody>

<!-- 🔥 DYNAMIC DATA FROM FLASK -->
{% for p in patients %}

<tr>
<td>PT{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>{{ p[4] }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
